# ============================================================
# Render Blueprint — Lab 6 Production AI Agent
#
# QUAN TRỌNG: Deploy bằng Blueprint, KHÔNG tạo Web Service thủ công.
#
# Deploy:
#   1. Push repo lên GitHub
#   2. Render Dashboard → New → Blueprint
#   3. Blueprint path: 06-lab-complete/render.yaml
#   4. Apply (tạo CẢ lab6-redis VÀ lab6-ai-agent)
# ============================================================

services:
  # ── Redis (Render Key Value) — PHẢI tạo trước web service ──
  - type: redis
    name: lab6-redis
    plan: free
    region: singapore
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Web Service — Docker agent ──
  - type: web
    name: lab6-ai-agent
    runtime: docker
    region: singapore
    plan: starter
    rootDir: 06-lab-complete
    dockerfilePath: Dockerfile
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: Production AI Agent
      - key: APP_VERSION
        value: "1.0.0"
      - key: LOG_LEVEL
        value: INFO
      - key: MODEL_NAME
        value: mock-agent
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10"
      - key: COST_PER_REQUEST_USD
        value: "0.001"
      - key: REDIS_CONNECT_RETRIES
        value: "30"
      - key: REDIS_CONNECT_RETRY_DELAY
        value: "2"
      # Auto-link Redis internal URL → REDIS_URL
      - key: REDIS_URL
        fromService:
          type: redis
          name: lab6-redis
          property: connectionString
      - key: AGENT_API_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
